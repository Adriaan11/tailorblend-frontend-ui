<!DOCTYPE html>
<html>
<head>
    <title>Generate PWA Icons</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        canvas {
            border: 1px solid #ccc;
            margin: 10px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Generate PWA Icons for TailorBlend</h1>
    <p>Click the buttons below to download the required icon sizes:</p>

    <div>
        <button onclick="generateIcon(192)">Download 192x192 Icon</button>
        <button onclick="generateIcon(512)">Download 512x512 Icon</button>
    </div>

    <div id="preview"></div>

    <script>
        function generateIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            // Background
            ctx.fillStyle = '#594ae2';
            ctx.roundRect(0, 0, size, size, size * 0.2);
            ctx.fill();

            // Text
            ctx.fillStyle = 'white';
            ctx.font = `bold ${size * 0.55}px Arial, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('TB', size / 2, size / 2);

            // Download
            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `icon-${size}.png`;
                a.click();
                URL.revokeObjectURL(url);
            });

            // Show preview
            const preview = document.getElementById('preview');
            const previewCanvas = canvas.cloneNode();
            const previewCtx = previewCanvas.getContext('2d');
            previewCanvas.width = 100;
            previewCanvas.height = 100;
            previewCtx.drawImage(canvas, 0, 0, 100, 100);
            preview.appendChild(previewCanvas);
        }

        // Polyfill for roundRect if not available
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, width, height, radius) {
                this.beginPath();
                this.moveTo(x + radius, y);
                this.lineTo(x + width - radius, y);
                this.arcTo(x + width, y, x + width, y + radius, radius);
                this.lineTo(x + width, y + height - radius);
                this.arcTo(x + width, y + height, x + width - radius, y + height, radius);
                this.lineTo(x + radius, y + height);
                this.arcTo(x, y + height, x, y + height - radius, radius);
                this.lineTo(x, y + radius);
                this.arcTo(x, y, x + radius, y, radius);
                this.closePath();
            };
        }
    </script>
</body>
</html>
